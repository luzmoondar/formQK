<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Popup Size Tester</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');

        :root {
            --bg: #f4f7fa;
            --primary: #3b82f6;
            --text: #1e293b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Pretendard', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            max-width: 800px;
            width: 100%;
            text-align: center;
        }

        h1 {
            margin-bottom: 1rem;
            font-size: 1.8rem;
        }

        p {
            color: #64748b;
            margin-bottom: 2rem;
        }

        .button-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
        }

        .popup-btn {
            background: #fff;
            border: 1px solid #e2e8f0;
            padding: 1rem;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
            color: #475569;
        }

        .popup-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: #eff6ff;
            transform: translateY(-2px);
        }

        /* --- Image Popup Overlay --- */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.3s ease;
            overflow: auto; /* Allow scrolling for large popups */
            padding: 40px 0;
        }

        .overlay.active {
            display: flex;
            opacity: 1;
        }

        .popup-container {
            position: relative;
            background: white;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            border-radius: 8px;
            overflow: hidden;
            transform: scale(0.9);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .overlay.active .popup-container {
            transform: scale(1);
        }

        .popup-img {
            display: block;
            object-fit: cover;
            width: 100%;
            height: auto;
        }

        .popup-footer {
            height: 50px;
            background: #222;
            color: #ccc;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            font-size: 13px;
        }

        .footer-left {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .footer-right {
            cursor: pointer;
        }

        .footer-right:hover, .footer-left:hover {
            color: white;
        }

        .footer-left input {
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>이미지 팝업 사이즈 테스트</h1>
        <p>사이즈별 버튼을 클릭하여 실제 팝업 느낌을 확인해보세요.</p>
        
        <div class="button-grid">
            <button class="popup-btn" onclick="openPopup('1250x370.jpg', 1250, 370)">1250 x 370 (와이드)</button>
            <button class="popup-btn" onclick="openPopup('1250x560.jpg', 1250, 560)">1250 x 560 (대형)</button>
            <button class="popup-btn" onclick="openPopup('360x167.jpg', 360, 167)">360 x 167 (소형)</button>
            <button class="popup-btn" onclick="openPopup('500x500.jpg', 500, 500)">500 x 500 (정사각형)</button>
            <button class="popup-btn" onclick="openPopup('600x840.jpg', 600, 840)">600 x 840 (세로형)</button>
            <button class="popup-btn" onclick="openPopup('723x167.jpg', 723, 167)">723 x 167 (배너형)</button>
            <button class="popup-btn" onclick="openPopup('500x700.jpg', 500, 700)">500 x 700 (세로형)</button>
        </div>
    </div>

    <!-- Popup Structure -->
    <div class="overlay" id="overlay" onclick="closePopup(event)">
        <div class="popup-container" id="popupContainer">
            <img src="" id="popupImg" class="popup-img" alt="Popup Content">
            <div class="popup-footer">
                <div class="footer-left" onclick="stopEvent(event)">
                    <input type="checkbox" id="close24">
                    <label for="close24">오늘 하루 보지 않기</label>
                </div>
                <div class="footer-right" onclick="closePopup()">
                    닫기
                </div>
            </div>
        </div>
    </div>

    <script>
        const overlay = document.getElementById('overlay');
        const popupImg = document.getElementById('popupImg');
        const popupContainer = document.getElementById('popupContainer');

        function openPopup(filename, width, height) {
            popupImg.src = './img/' + filename;
            
            // Set explicit width and height from filename
            popupContainer.style.width = width + 'px';
            
            // The height of the container should be height of image + footer (50px)
            popupContainer.style.height = (height + 50) + 'px';
            
            // Ensure the image inside also respects the height
            popupImg.style.height = height + 'px';
            popupImg.style.width = width + 'px';

            overlay.classList.add('active');
        }

        function closePopup(e) {
            if (e && e.target !== overlay && e.target.className !== 'footer-right') return;
            overlay.classList.remove('active');
        }

        function stopEvent(e) {
            e.stopPropagation();
        }
    </script>
</body>
</html>
